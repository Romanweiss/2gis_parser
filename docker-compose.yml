services:
  parser-2gis:
    build:
      context: .
      dockerfile: Dockerfile
    image: parser-2gis:local
    init: true
    volumes:
      - ./output:/data
  parser-2gis-ui:
    build:
      context: .
      dockerfile: Dockerfile
    image: parser-2gis:local
    init: true
    volumes:
      - ./output:/data
    ports:
      - "8787:8787"
    entrypoint: ["parser-2gis-webui", "--host", "0.0.0.0", "--port", "8787"]
